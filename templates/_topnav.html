<div class="nav-loading-overlay" data-nav-loading hidden role="status" aria-live="polite">
  <span class="nav-loading-spinner" aria-hidden="true"></span>
  <span class="nav-loading-text" data-nav-loading-text>Loading&hellip;</span>
</div>

<script>
  // Full-page loading overlay for navigations and form posts. Slow pages (the
  // audit dashboard in particular) otherwise look frozen, and impatient users
  // re-click and re-fire the query. The overlay swallows those extra clicks.
  (function () {
    var overlay = document.querySelector("[data-nav-loading]");
    if (!overlay) return;
    var textEl = overlay.querySelector("[data-nav-loading-text]");
    var defaultText = textEl ? textEl.textContent : "";
    var showTimer = null;

    function show(message) {
      if (textEl) textEl.textContent = message || defaultText;
      // Small delay so fast navigations don't flash the overlay.
      if (showTimer) clearTimeout(showTimer);
      showTimer = setTimeout(function () {
        overlay.hidden = false;
      }, 150);
    }

    function hide() {
      if (showTimer) clearTimeout(showTimer);
      showTimer = null;
      overlay.hidden = true;
    }

    document.addEventListener("click", function (event) {
      if (event.defaultPrevented || event.button !== 0) return;
      if (event.metaKey || event.ctrlKey || event.shiftKey || event.altKey) return;
      var link = event.target.closest ? event.target.closest("a[href]") : null;
      if (!link) return;
      if (link.target && link.target !== "_self") return;
      if (link.hasAttribute("download") || link.hasAttribute("data-no-loading")) return;
      var href = link.getAttribute("href");
      if (!href || href.charAt(0) === "#") return;
      if (/^(javascript|mailto|tel):/i.test(href)) return;
      if (link.origin && link.origin !== window.location.origin) return;
      show(link.getAttribute("data-loading-message"));
    });

    document.addEventListener("submit", function (event) {
      if (event.defaultPrevented) return;
      var form = event.target;
      if (form.target && form.target !== "_self") return;
      if (form.hasAttribute("data-no-loading")) return;
      show(form.getAttribute("data-loading-message"));
    });

    // Restore the page if the user comes back via bfcache or cancels the
    // navigation (Esc), so the overlay never gets stuck.
    window.addEventListener("pageshow", hide);
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") hide();
    });
  })();
</script>

<script>
  // Hydrate the operator name/initial from the value saved on the audit pages.
  (function () {
    try {
      var name = (localStorage.getItem("audit_operator_name") || "").trim();
      if (!name) return;
      var nameEl = document.querySelector("[data-operator-name]");
      var initialEl = document.querySelector("[data-operator-initial]");
      if (nameEl) nameEl.textContent = name;
      if (initialEl) initialEl.textContent = name.charAt(0).toUpperCase();
    } catch (e) {}
  })();
</script>
